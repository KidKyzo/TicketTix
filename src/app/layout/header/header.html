<div class="header-bar"></div>

<nav class="navbar">
  <div class="nav-left">
    <span class="logo-text" routerLink="/">Ticketix</span>
  </div>

  <div class="nav-links">
    <a routerLink="/register-organizer">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Create Event
    </a>
    <a routerLink="/my-tickets">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M4 8V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"></path>
        <path d="M20 10v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8"></path>
        <path d="M7 14h10"></path>
      </svg>
      My Ticket
    </a>
    <button *ngIf="!user" routerLink="/login" class="login-btn">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
        <polyline points="10 17 15 12 10 7"></polyline>
        <line x1="15" y1="12" x2="3" y2="12"></line>
      </svg>
      Login
    </button>

    <div *ngIf="user" class="logged-info">
      <span class="user-info">Logged in as: {{ user.email }}</span>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </div>
</nav>
