<div class="register-container">
  <div class="register-card">
    <h2 class="page-title">Create Account</h2>
    <p class="subtitle">Register as an attendee to purchase tickets</p>

    <form>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="name" name="name" placeholder="Your full name" />
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="your.email@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Min. 6 characters"
        />
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Confirm password"
        />
      </div>

      <button type="button" class="submit-btn" (click)="register()" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Registering...' : 'Register' }}
      </button>

      <p class="login-link">Already have an account? <a href="/login">Login here</a></p>
    </form>
  </div>
</div>
